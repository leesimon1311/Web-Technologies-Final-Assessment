<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Quest International University – Campus Lost and Found Management System" />
  <title>Campus Lost and Found Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLge==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Header -->
  <header class="header" role="banner">
    <div class="container header__inner">
      <div class="header__brand">
        <span class="header__icon" aria-hidden="true">🎓</span>
        <div>
          <h1 class="header__title">Campus Lost and Found Management System</h1>
          <p class="header__subtitle">Quest International University</p>
        </div>
      </div>
      <button class="btn btn--primary" id="reportBtn" aria-label="Submit a report">
        <i class="fa fa-plus" aria-hidden="true"></i> Submit Report
      </button>
    </div>
  </header>

  <!-- Navigation Tabs -->
  <nav class="tabs" role="navigation" aria-label="Content filters">
    <div class="container tabs__inner">
      <button class="tab tab--active" data-tab="all">All Items</button>
      <button class="tab" data-tab="Lost">Lost Items</button>
      <button class="tab" data-tab="Found">Found Items</button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main" role="main">
    <div class="container">
      <!-- Search & Filters -->
      <section class="filters" aria-label="Search and filter">
        <div class="filters__search">
          <label for="searchInput" class="sr-only">Search items</label>
          <i class="fa fa-search filters__search-icon" aria-hidden="true"></i>
          <input type="search" id="searchInput" class="input" placeholder="Search items, locations..." aria-label="Search items" />
        </div>
        <div class="filters__controls">
          <label for="statusFilter" class="sr-only">Filter by status</label>
          <select id="statusFilter" class="select" aria-label="Filter by status">
            <option value="">All Statuses</option>
            <option value="Active">Active</option>
            <option value="Claimed">Claimed</option>
            <option value="Resolved">Resolved</option>
          </select>
        </div>
      </section>

      <!-- Stats Bar -->
      <section class="stats" aria-label="Item statistics">
        <div class="stat-card stat-card--total">
          <span class="stat-card__number" id="statTotal">–</span>
          <span class="stat-card__label">Total</span>
        </div>
        <div class="stat-card stat-card--lost">
          <span class="stat-card__number" id="statLost">–</span>
          <span class="stat-card__label">Lost</span>
        </div>
        <div class="stat-card stat-card--found">
          <span class="stat-card__number" id="statFound">–</span>
          <span class="stat-card__label">Found</span>
        </div>
        <div class="stat-card stat-card--active">
          <span class="stat-card__number" id="statActive">–</span>
          <span class="stat-card__label">Active</span>
        </div>
      </section>

      <!-- Items Grid -->
      <section aria-label="Items list">
        <div id="itemsGrid" class="items-grid" role="list">
          <!-- populated by JS -->
        </div>
        <div id="emptyState" class="empty-state" hidden>
          <span class="empty-state__icon" aria-hidden="true">🔍</span>
          <p class="empty-state__text">No items found.</p>
          <button class="btn btn--secondary" id="emptyReportBtn">Submit a Report</button>
        </div>
        <div id="loadingState" class="loading" role="status" aria-live="polite">
          <div class="spinner" aria-hidden="true"></div>
          <span>Loading items…</span>
        </div>
      </section>
    </div>
  </main>

  <!-- ─── Report Modal ──────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="reportModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal">
      <header class="modal__header">
        <h2 class="modal__title" id="modalTitle">Submit Report</h2>
        <button class="modal__close" id="closeModal" aria-label="Close modal">&times;</button>
      </header>

      <form id="reportForm" class="form" novalidate>
        <input type="hidden" id="itemId" />

        <div class="form__row form__row--2">
          <div class="form__group">
            <label class="form__label" for="category">Report Type <span aria-hidden="true">*</span></label>
            <select id="category" name="category" class="select" required aria-required="true">
              <option value="">Select type…</option>
              <option value="Lost">Lost Item</option>
              <option value="Found">Found Item</option>
            </select>
            <span class="form__error" id="categoryError" role="alert"></span>
          </div>
          <div class="form__group">
            <label class="form__label" for="item_category">Item Category <span aria-hidden="true">*</span></label>
            <select id="item_category" name="item_category" class="select" required aria-required="true">
              <option value="">Select category…</option>
              <option value="Electronics">Electronics</option>
              <option value="Documents">Documents</option>
              <option value="Personal Items">Personal Items</option>
              <option value="Clothing">Clothing</option>
              <option value="Keys">Keys</option>
              <option value="Accessories">Accessories</option>
              <option value="Books">Books</option>
              <option value="Other">Other</option>
            </select>
            <span class="form__error" id="item_categoryError" role="alert"></span>
          </div>
        </div>

        <div class="form__group">
          <label class="form__label" for="title">Item Title <span aria-hidden="true">*</span></label>
          <input type="text" id="title" name="title" class="input" required aria-required="true"
            placeholder="e.g. Black HP Laptop Bag" maxlength="255" />
          <span class="form__error" id="titleError" role="alert"></span>
        </div>

        <div class="form__group">
          <label class="form__label" for="description">Description <span aria-hidden="true">*</span></label>
          <textarea id="description" name="description" class="textarea" required aria-required="true"
            placeholder="Describe the item in detail…" rows="3" maxlength="2000"></textarea>
          <span class="form__error" id="descriptionError" role="alert"></span>
        </div>

        <div class="form__row form__row--2">
          <div class="form__group">
            <label class="form__label" for="location">Location <span aria-hidden="true">*</span></label>
            <input type="text" id="location" name="location" class="input" required aria-required="true"
              placeholder="e.g. Library, 2nd Floor" maxlength="255" />
            <span class="form__error" id="locationError" role="alert"></span>
          </div>
          <div class="form__group">
            <label class="form__label" for="date_reported">Date <span aria-hidden="true">*</span></label>
            <input type="date" id="date_reported" name="date_reported" class="input" required aria-required="true" />
            <span class="form__error" id="date_reportedError" role="alert"></span>
          </div>
        </div>

        <fieldset class="form__fieldset">
          <legend class="form__legend">Contact Information</legend>
          <div class="form__row form__row--2">
            <div class="form__group">
              <label class="form__label" for="contact_name">Your Name <span aria-hidden="true">*</span></label>
              <input type="text" id="contact_name" name="contact_name" class="input" required aria-required="true"
                placeholder="Full Name" maxlength="150" />
              <span class="form__error" id="contact_nameError" role="alert"></span>
            </div>
            <div class="form__group">
              <label class="form__label" for="contact_phone">Phone Number</label>
              <input type="tel" id="contact_phone" name="contact_phone" class="input"
                placeholder="e.g. 0123456789" maxlength="20" />
              <span class="form__error" id="contact_phoneError" role="alert"></span>
            </div>
          </div>
          <div class="form__group">
            <label class="form__label" for="contact_email">Email Address <span aria-hidden="true">*</span></label>
            <input type="email" id="contact_email" name="contact_email" class="input" required aria-required="true"
              placeholder="you@student.qiu.edu.my" maxlength="255" />
            <span class="form__error" id="contact_emailError" role="alert"></span>
          </div>
        </fieldset>

        <!-- Status (only shown when editing) -->
        <div class="form__group" id="statusGroup" hidden>
          <label class="form__label" for="status">Status</label>
          <select id="status" name="status" class="select">
            <option value="Active">Active</option>
            <option value="Claimed">Claimed</option>
            <option value="Resolved">Resolved</option>
          </select>
        </div>

        <div class="form__actions">
          <button type="button" class="btn btn--secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn--primary" id="submitBtn">
            <i class="fa fa-save" aria-hidden="true"></i> Submit Report
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ─── Detail Modal ─────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="detailModal" role="dialog" aria-modal="true" aria-labelledby="detailTitle" hidden>
    <div class="modal modal--detail">
      <header class="modal__header">
        <h2 class="modal__title" id="detailTitle">Item Details</h2>
        <button class="modal__close" id="closeDetail" aria-label="Close detail">&times;</button>
      </header>
      <div id="detailContent" class="detail"></div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Quest International University — Lost and Found Management System</p>
    </div>
  </footer>

  <script src="js/app.js" defer></script>
</body>
</html>
